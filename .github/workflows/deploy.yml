name: Deploy CardBot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy files
        run: |
          rsync -a --no-owner --no-group --no-perms --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.env.example' \
            --exclude 'cardbot.log' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            ./ /opt/cardbot/
          sudo touch /opt/cardbot/cardbot.log
          sudo chmod 664 /opt/cardbot/cardbot.log

      - name: Install dependencies
        run: |
          cd /opt/cardbot
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Restart service
        run: |
          sudo systemctl restart cardbot
          for attempt in {1..30}; do
            status="$(sudo systemctl is-active cardbot || true)"
            if [ "$status" = "active" ]; then
              echo "$status"
              exit 0
            fi
            sleep 2
          done
          sudo systemctl is-active cardbot
          exit 1
