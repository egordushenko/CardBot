name: Deploy CardBot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy files
        run: |
          sudo systemctl stop cardbot
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude '.env.example' \
            --exclude 'cardbot.log' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            ./ /opt/cardbot/

      - name: Install dependencies
        run: |
          cd /opt/cardbot
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Restart service
        run: |
          sudo systemctl restart cardbot
          sleep 5
          sudo systemctl is-active cardbot
